  - Webhooks
  properties:
  - type: Documentation
    url: https://docs.moralis.com/streams-api
- aid: moralis:auth-api
  name: Moralis Auth API
  description: REST API for Sign-In with Ethereum / Solana challenge generation and
    verification.
  humanURL: https://docs.moralis.com/authentication-api
  baseURL: https://authapi.moralis.io
  tags:
  - REST
  - Auth
