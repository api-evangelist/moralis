specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Moralis
providerId: moralis
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Web3
- Blockchain
- Data API
- Streams
- Indexing
- Plans
description: Moralis sells the Data API on tiered subscriptions with monthly compute
  units; Streams and Datashare are billed separately.
notes: Compute units vary per endpoint; archive/heavy endpoints cost more.
sources:
- https://moralis.com/pricing
plans:
- id: moralis-free
  name: Free
  type: free
  description: Free plan with 40k monthly CUs.
  entries:
  - label: Monthly Compute Units
    name: monthly_cus
    type: included
    metric: compute_units
    limit: 40000
    timeFrame: month
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: Community Support
- id: moralis-starter
  name: Starter
  type: paid
  description: Entry-level paid plan.
  entries:
  - label: Monthly Subscription
    name: monthly_subscription
    type: flat
    metric: subscription
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: 49
    userMultiplied: false
  - label: Monthly CUs
    name: monthly_cus
    type: included
    metric: compute_units
    limit: 25000000
    timeFrame: month
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: Streams
  - name: Email Support
- id: moralis-pro
  name: Pro
  type: paid
  description: Production tier with higher CUs and priority support.
  entries:
  - label: Monthly Subscription
    name: monthly_subscription
    type: flat
    metric: subscription
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: 249
    userMultiplied: false
  elements:
  - name: Higher Throughput
  - name: Priority Support
- id: moralis-business
  name: Business
  type: paid
  description: Higher-volume tier.
  entries:
  - label: Monthly Subscription
    name: monthly_subscription
    type: flat
    metric: subscription
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: 999
    userMultiplied: false
  elements:
  - name: Slack Support
- id: moralis-enterprise
  name: Enterprise
  type: enterprise
  description: Custom contracts including Data Indexer and Datashare.
  entries:
  - label: Custom
    name: custom
    type: flat
    metric: contract
    limit: -1
    timeFrame: year
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: false
  elements:
  - name: Datashare
  - name: Data Indexer
  - name: SLA
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
