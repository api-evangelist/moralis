specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Moralis
providerId: moralis
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Web3
- Blockchain
- Data API
- Streams
- Indexing
- Rate Limiting
description: Moralis enforces per-API-key requests-per-second and monthly compute-unit
  caps.
notes: Streams have separate event-rate limits.
sources:
- https://docs.moralis.com/web3-data-api/evm/rate-limits
- https://moralis.com/pricing
responseCodes:
  throttled: 429
limits:
- name: Free Throughput
  scope: api_key
  metric: requests_per_second
  limit: 25
  notes: Free plan.
- name: Starter Throughput
  scope: api_key
  metric: requests_per_second
  limit: 150
  notes: Starter plan.
- name: Pro Throughput
  scope: api_key
  metric: requests_per_second
  limit: 750
  notes: Pro plan.
- name: Monthly CU Cap
  scope: account
  metric: compute_units
  limit: see plan
  notes: Monthly compute unit ceiling.
policies:
- name: Backoff Strategy
  description: Exponential backoff on 429.
- name: Pagination
  description: Paginate with cursor; avoid large limit values.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
