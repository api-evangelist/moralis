naftiko: 1.0.0-alpha2
info:
  label: EVM API — NFT
  description: 'EVM API — NFT. 28 operations. Lead operation: Get Metadata for NFTs. Self-contained Naftiko capability covering
    one Moralis business surface.'
  tags:
  - Moralis
  - NFT
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MORALIS_API_KEY: MORALIS_API_KEY
capability:
  consumes:
  - type: http
    namespace: evm-nft
    baseUri: https://deep-index.moralis.io/api/v2.2
    description: EVM API — NFT business capability. Self-contained, no shared references.
    resources:
    - name: nft-getMultipleNFTs
      path: /nft/getMultipleNFTs
      operations:
      - name: getmultiplenfts
        method: POST
        description: Get Metadata for NFTs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: chain
          in: query
          type: string
          description: The chain to query
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: nft-metadata
      path: /nft/metadata
      operations:
      - name: getnftbulkcontractmetadata
        method: POST
        description: Get metadata for multiple NFT contracts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: chain
          in: query
          type: string
          description: The chain to query
        - name: include_prices
          in: query
          type: boolean
          description: Should NFT last sale prices be included in the result?
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: nft-address
      path: /nft/{address}
      operations:
      - name: getcontractnfts
        method: GET
        description: Get NFTs by contract address
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: chain
          in: query
          type: string
          description: The chain to query
        - name: address
          in: path
          type: string
          description: The address of the NFT contract
          required: true
        - name: format
          in: query
          type: string
          description: The format of the token ID
        - name: limit
          in: query
          type: integer
          description: The desired page size of the result.
        - name: totalRanges
          in: query
          type: integer
          description: The number of subranges to split the results into
        - name: range
          in: query
          type: integer
          description: The desired subrange to query
        - name: cursor
          in: query
          type: string
          description: The cursor returned in the previous response (used for getting the next page).
        - name: normalizeMetadata
          in: query
          type: boolean
          description: Should normalized metadata be returned?
        - name: media_items
          in: query
          type: boolean
          description: Should preview media data be returned?
        - name: include_prices
          in: query
          type: boolean
          description: Should NFT last sale prices be included in the result?
