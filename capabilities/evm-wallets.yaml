        idempotent: true
      call: evm-wallets.getwalletprofitabilitysummary
      with:
        address: tools.address
        days: tools.days
        chain: tools.chain
      outputParameters:
      - type: object
        mapping: $.
    - name: get-summary-stats-wallet-address
      description: Get summary stats by wallet address
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: evm-wallets.getwalletstats
      with:
        chain: tools.chain
        address: tools.address
      outputParameters:
      - type: object
