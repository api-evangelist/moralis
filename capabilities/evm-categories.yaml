naftiko: 1.0.0-alpha2
info:
  label: EVM API — Categories
  description: 'EVM API — Categories. 1 operations. Lead operation: Get ERC20 token categories. Self-contained Naftiko capability
    covering one Moralis business surface.'
  tags:
  - Moralis
  - Categories
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MORALIS_API_KEY: MORALIS_API_KEY
capability:
  consumes:
  - type: http
    namespace: evm-categories
    baseUri: https://deep-index.moralis.io/api/v2.2
    description: EVM API — Categories business capability. Self-contained, no shared references.
    resources:
    - name: tokens-categories
      path: /tokens/categories
      operations:
      - name: gettokencategories
        method: GET
        description: Get ERC20 token categories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.MORALIS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: evm-categories-rest
    port: 8080
    description: REST adapter for EVM API — Categories. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/tokens/categories
      name: tokens-categories
      description: REST surface for tokens-categories.
      operations:
      - method: GET
        name: gettokencategories
        description: Get ERC20 token categories
        call: evm-categories.gettokencategories
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: evm-categories-mcp
    port: 9090
    transport: http
    description: MCP adapter for EVM API — Categories. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-erc20-token-categories
      description: Get ERC20 token categories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: evm-categories.gettokencategories
      outputParameters:
      - type: object
        mapping: $.
