        - name: to_date
          in: query
          type: string
          description: The end date from which to get the transfers (format in seconds or datestring accepted by momentjs)
        - name: cursor
          in: query
          type: string
          description: The cursor returned in the previous response (used for getting the next page).
        - name: limit
