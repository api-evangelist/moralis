        inputParameters:
        - name: chain
          in: query
          type: string
          description: The chain to query
        - name: tokenAddress
          in: path
          type: string
          description: The token address
          required: true
        - name: fromDate
          in: query
          type: string
          description: The starting date (format in seconds or datestring accepted by momentjs)
          required: true
        - name: toDate
          in: query
          type: string
          description: The ending date (format in seconds or datestring accepted by momentjs)
          required: true
        - name: limit
          in: query
          type: integer
          description: The number of results to return
        - name: cursor
          in: query
          type: string
          description: The cursor returned in the previous response (used for getting the next page)
        - name: timeFrame
          in: query
          type: string
          description: The time frame to group the data by
          required: true
    - name: erc20-token_address-owners
      path: /erc20/{token_address}/owners
      operations:
      - name: gettokenowners
        method: GET
        description: Get ERC20 token owners by contract
        outputRawFormat: json
        outputParameters:
        - name: result
