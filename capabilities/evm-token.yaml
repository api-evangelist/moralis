        - name: isVerifiedContract
          in: query
          type: boolean
          description: True to include only verified contracts
        - name: sortBy
          in: query
          type: string
          description: Sort by volume1hDesc, volume24hDesc, liquidityDesc, marketCapDesc
        - name: boostVerifiedContracts
