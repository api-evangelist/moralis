naftiko: 1.0.0-alpha2
info:
  label: EVM API — Entities
  description: 'EVM API — Entities. 4 operations. Lead operation: Get Entity Categories. Self-contained Naftiko capability
    covering one Moralis business surface.'
  tags:
  - Moralis
  - Entities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MORALIS_API_KEY: MORALIS_API_KEY
capability:
  consumes:
  - type: http
    namespace: evm-entities
    baseUri: https://deep-index.moralis.io/api/v2.2
    description: EVM API — Entities business capability. Self-contained, no shared references.
    resources:
    - name: entities-categories
      path: /entities/categories
      operations:
      - name: getentitycategories
        method: GET
        description: Get Entity Categories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: The desired page size of the result.
    - name: entities-categories-categoryId
      path: /entities/categories/{categoryId}
      operations:
      - name: getentitiesbycategory
        method: GET
        description: Get Entities By Category
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: categoryId
          in: path
          type: string
          description: The category Id
          required: true
        - name: limit
          in: query
          type: integer
          description: The desired page size of the result.
    - name: entities-search
      path: /entities/search
      operations:
      - name: searchentities
        method: GET
        description: Search Entities, Organizations or Wallets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          description: The search query
          required: true
        - name: limit
          in: query
          type: integer
          description: The desired page size of the result.
    - name: entities-entityId
      path: /entities/{entityId}
      operations:
      - name: getentity
        method: GET
        description: Get Entity Details By Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: entityId
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.MORALIS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: evm-entities-rest
    port: 8080
    description: REST adapter for EVM API — Entities. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/entities/categories
      name: entities-categories
      description: REST surface for entities-categories.
      operations:
      - method: GET
        name: getentitycategories
        description: Get Entity Categories
        call: evm-entities.getentitycategories
        with:
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/entities/categories/{categoryid}
      name: entities-categories-categoryid
      description: REST surface for entities-categories-categoryId.
      operations:
      - method: GET
        name: getentitiesbycategory
        description: Get Entities By Category
        call: evm-entities.getentitiesbycategory
        with:
          categoryId: rest.categoryId
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/entities/search
      name: entities-search
      description: REST surface for entities-search.
      operations:
      - method: GET
        name: searchentities
        description: Search Entities, Organizations or Wallets
        call: evm-entities.searchentities
        with:
          query: rest.query
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/entities/{entityid}
      name: entities-entityid
      description: REST surface for entities-entityId.
      operations:
      - method: GET
        name: getentity
        description: Get Entity Details By Id
        call: evm-entities.getentity
        with:
          entityId: rest.entityId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: evm-entities-mcp
    port: 9090
    transport: http
    description: MCP adapter for EVM API — Entities. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-entity-categories
      description: Get Entity Categories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: evm-entities.getentitycategories
      with:
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-entities-category
      description: Get Entities By Category
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: evm-entities.getentitiesbycategory
      with:
        categoryId: tools.categoryId
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: search-entities-organizations-wallets
      description: Search Entities, Organizations or Wallets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: evm-entities.searchentities
      with:
        query: tools.query
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-entity-details-id
      description: Get Entity Details By Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: evm-entities.getentity
      with:
        entityId: tools.entityId
      outputParameters:
      - type: object
        mapping: $.
