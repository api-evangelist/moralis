naftiko: 1.0.0-alpha2
info:
  label: EVM API — Utils
  description: 'EVM API — Utils. 4 operations. Lead operation: Review contracts. Self-contained Naftiko capability covering
    one Moralis business surface.'
  tags:
  - Moralis
  - Utils
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MORALIS_API_KEY: MORALIS_API_KEY
capability:
  consumes:
  - type: http
    namespace: evm-utils
    baseUri: https://deep-index.moralis.io/api/v2.2
    description: EVM API — Utils business capability. Self-contained, no shared references.
    resources:
    - name: contracts-review
      path: /contracts-review
      operations:
      - name: reviewcontracts
        method: POST
        description: Review contracts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: chain
          in: query
          type: string
          description: The chain to query
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: info-endpointWeights
      path: /info/endpointWeights
      operations:
      - name: endpointweights
        method: GET
        description: Get weights of endpoints
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: web3-version
      path: /web3/version
      operations:
      - name: web3apiversion
        method: GET
        description: Get API version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: address-function
      path: /{address}/function
      operations:
      - name: runcontractfunction
        method: POST
        description: Run contract function
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: chain
          in: query
          type: string
          description: The chain to query
        - name: address
          in: path
          type: string
          description: The address of the contract
          required: true
        - name: function_name
          in: query
          type: string
          description: The function name of the contract
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.MORALIS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: evm-utils-rest
    port: 8080
    description: REST adapter for EVM API — Utils. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/contracts-review
      name: contracts-review
      description: REST surface for contracts-review.
      operations:
      - method: POST
        name: reviewcontracts
        description: Review contracts
        call: evm-utils.reviewcontracts
        with:
          chain: rest.chain
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/info/endpointweights
      name: info-endpointweights
      description: REST surface for info-endpointWeights.
      operations:
      - method: GET
        name: endpointweights
        description: Get weights of endpoints
        call: evm-utils.endpointweights
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/web3/version
      name: web3-version
      description: REST surface for web3-version.
      operations:
      - method: GET
        name: web3apiversion
        description: Get API version
        call: evm-utils.web3apiversion
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{address}/function
      name: address-function
      description: REST surface for address-function.
      operations:
      - method: POST
        name: runcontractfunction
        description: Run contract function
        call: evm-utils.runcontractfunction
        with:
          chain: rest.chain
          address: rest.address
          function_name: rest.function_name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: evm-utils-mcp
    port: 9090
    transport: http
    description: MCP adapter for EVM API — Utils. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: review-contracts
      description: Review contracts
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: evm-utils.reviewcontracts
      with:
        chain: tools.chain
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-weights-endpoints
      description: Get weights of endpoints
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: evm-utils.endpointweights
      outputParameters:
      - type: object
        mapping: $.
    - name: get-api-version
      description: Get API version
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: evm-utils.web3apiversion
      outputParameters:
      - type: object
        mapping: $.
    - name: run-contract-function
      description: Run contract function
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: evm-utils.runcontractfunction
      with:
        chain: tools.chain
        address: tools.address
        function_name: tools.function_name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
